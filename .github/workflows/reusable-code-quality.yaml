name: Code Quality Workflow

on:
  workflow_dispatch:
    inputs:
      upload_to_grafana:
        description: "Whether to send metrics to Grafana"
        required: true
        type: boolean

jobs:
  analyze_and_test:
    name: Tests and Analysis
    runs-on: ubuntu-latest
    defaults:
      run: 
        working-directory: ./rov_frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Download dependencies
        run: flutter pub get

      - name: Static Code Analysis
        run: |
          mkdir -p build/test_results
          flutter analyze > analyze_output.txt || true
          
          INFOS=$(grep "info ‚ÄĘ" analyze_output.txt | wc -l | tr -d ' ')
          WARNINGS=$(grep "warning ‚ÄĘ" analyze_output.txt | wc -l | tr -d ' ')
          ERRORS=$(grep "error ‚ÄĘ" analyze_output.txt | wc -l | tr -d ' ')
          TOTAL=$((INFOS + WARNINGS + ERRORS))
          
          cat <<EOF > build/test_results/static_analysis_metrics.json
          {
            "infos": $INFOS,
            "warnings": $WARNINGS,
            "errors": $ERRORS,
            "total_issues": $TOTAL
          }
          EOF

      - name: Unit Tests and Code Coverage Stats
        run: |
          mkdir -p build/test_results
          flutter test --coverage || true
          
          if [ -f coverage/lcov.info ]; then
            LF=$(grep "^LF:" coverage/lcov.info | awk -F ':' '{sum += $2} END {print sum}')
            LH=$(grep "^LH:" coverage/lcov.info | awk -F ':' '{sum += $2} END {print sum}')
            LF=${LF:-0}
            LH=${LH:-0}
            PERCENTAGE=$(awk "BEGIN {if ($LF>0) printf \"%.2f\", ($LH/$LF)*100; else print 0}")
          else
            LF=0
            LH=0
            PERCENTAGE=0
          fi
          
          cat <<EOF > build/test_results/coverage_metrics.json
          {
            "lines_found": $LF,
            "lines_hit": $LH,
            "coverage_percentage": $PERCENTAGE
          }
          EOF

      - name: Save Results as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-metrics-${{ github.run_id }}
          path: ./rov_frontend/build/test_results/*.json

      - name: Send Metrics to Grafana
        if: ${{ inputs.upload_to_grafana == true }}
        run: |
          echo "Downoload values from JSON files..."
          
          INFOS=$(jq -r '.infos' build/test_results/static_analysis_metrics.json)
          WARNINGS=$(jq -r '.warnings' build/test_results/static_analysis_metrics.json)
          ERRORS=$(jq -r '.errors' build/test_results/static_analysis_metrics.json)
          ISSUES=$(jq -r '.total_issues' build/test_results/static_analysis_metrics.json)
          
          COVERAGE=$(jq -r '.coverage_percentage' build/test_results/coverage_metrics.json)
          
          echo "Code coverage: $COVERAGE%"
          echo "Sending static analysis results..."
          curl -X POST -u "${{ secrets.GRAFANA_USER }}:${{ secrets.GRAFANA_PASS }}" \
               "${{ secrets.GRAFANA_URL }}" \
               --data-binary "static_analysis,project=rov_frontend,run=${{ github.run_number }} infos=${INFOS},warnings=${WARNINGS},errors=${ERRORS},total_issues=${ISSUES}"
               
          echo "Sending code coverage results..."
          curl -X POST -u "${{ secrets.GRAFANA_USER }}:${{ secrets.GRAFANA_PASS }}" \
               "${{ secrets.GRAFANA_URL }}" \
               --data-binary "code_coverage,project=rov_frontend,run=${{ github.run_number }} percentage=${COVERAGE}"