name: RovController Verification Workflow

on:
  pull_request: 
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  pull-requests: read
  contents: read

jobs:
  detect-changes:
    name: Detect Changed Packages
    runs-on: ubuntu-latest

    outputs:
      packages: ${{ steps.filter-changes.outputs.changes }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: List Changed Files
        id: filter-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rov_frontend: 'rov_frontend/**'
            rov_backend: 'rov_backend/**'

  verify:
    name: Code Verification
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.packages != '[]' && needs.detect-changes.outputs.packages != '' }}

    strategy: 
      matrix:
        package: ${{ fromJSON(needs.detect-changes.outputs.packages) }}
      fail-fast: false

    defaults:
      run:
        working-directory: ./${{ matrix.package }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          flutter pub get

      - name: Generate platform folders
        if: ${{ matrix.package == 'rov_frontend' }}
        run: |
          flutter create .

      - name: Build App
        if: ${{ matrix.package == 'rov_frontend' }}
        run: |
          flutter build apk --debug

        

  # kanban-validation:
  #   name: Kanban Update and Validation
  #   runs-on: ubuntu-latest