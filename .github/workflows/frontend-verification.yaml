name: Frontend Verification Workflow

on:
  pull_request: 
    types: [opened]
    branches: [main]
    paths:
      - 'rov_frontend/**'

jobs:
  verify:
    name: Flutter Frontend verify
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./rov_frontend
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          flutter pub get

      - name: Build App
        run: |
          flutter build apk --debug

        

  # kanban-validation:
