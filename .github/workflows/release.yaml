name: Rov Controller Release Workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (np. 1.0.0+1)'
        required: true
        default: '1.0.0+1'
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./rov_frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update version in pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ inputs.version }}/g" pubspec.yaml
          echo "Zaktualizowano pubspec.yaml do wersji: ${{ inputs.version }}"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate platform folders
        run: flutter create .

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat << EOF > android/key.properties
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Create GitHub Release and Upload AAB
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          files: rov_frontend/build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true