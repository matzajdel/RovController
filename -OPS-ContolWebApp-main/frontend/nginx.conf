server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Small static cache policy.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
