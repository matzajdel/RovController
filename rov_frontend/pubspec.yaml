name: rov_frontend
description: Flutter frontend for RovController using rov_backend.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  rov_backend:
    path: ../rov_backend

  path_provider: ^2.1.1
  wifi_scan: ^0.4.1+2
  permission_handler: ^12.0.3
  sensors_plus: ^7.0.0
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - Subway_surfer_gameplay_no_commentary.mp4
